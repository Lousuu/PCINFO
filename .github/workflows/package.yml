name: Package Windows builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  package:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up .NET 8
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Resolve and validate package metadata
        id: metadata
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\hardwarevision-package-logs" | Out-Null
          [xml]$project = Get-Content .\HardwareVision\HardwareVision.csproj
          $properties = $project.Project.PropertyGroup |
            Where-Object { $_.Version } |
            Select-Object -First 1
          $productVersion = [string]$properties.Version
          $fileVersion = [string]$properties.FileVersion
          $runtimeIdentifier = [string]$properties.RuntimeIdentifier
          if ([string]::IsNullOrWhiteSpace($productVersion)) {
            throw "Project Version is missing."
          }
          if ([string]::IsNullOrWhiteSpace($fileVersion)) {
            throw "Project FileVersion is missing."
          }
          if ($runtimeIdentifier -cne "win-x64") {
            throw "RuntimeIdentifier must be win-x64; found '$runtimeIdentifier'."
          }

          $isTagBuild = $env:GITHUB_EVENT_NAME -eq "push" -and
            $env:GITHUB_REF_TYPE -eq "tag"
          if ($isTagBuild) {
            if ($productVersion -match "(?i)(dev|preview|alpha|beta|rc)") {
              throw "Tag builds require a stable Version; found '$productVersion'."
            }
            $expectedTag = "v$productVersion"
            if ($env:GITHUB_REF_NAME -cne $expectedTag) {
              throw "Tag '$env:GITHUB_REF_NAME' must exactly match '$expectedTag'."
            }
            $buildChannel = "stable"
          }
          else {
            $buildChannel = "workflow-dispatch"
          }

          $manifest = Get-Content .\HardwareVision\app.manifest -Raw
          if ($manifest -notmatch 'requestedExecutionLevel\s+level="requireAdministrator"') {
            throw "Application manifest must request requireAdministrator."
          }

          $requiredResources = @(
            "ThirdParty\PresentMon\2.5.1\PresentMon.exe"
            "ThirdParty\PresentMon\2.5.1\LICENSE.txt"
            "ThirdParty\PresentMon\2.5.1\THIRD_PARTY.txt"
          )
          $embeddedResources = @($project.Project.ItemGroup.EmbeddedResource | ForEach-Object { [string]$_.Include })
          foreach ($resource in $requiredResources) {
            if ($embeddedResources -notcontains $resource) {
              throw "Required embedded resource is missing from the project: $resource"
            }
            if (-not (Test-Path (Join-Path .\HardwareVision $resource) -PathType Leaf)) {
              throw "Required embedded resource file is missing: $resource"
            }
          }

          "product_version=$productVersion" >> $env:GITHUB_OUTPUT
          "file_version=$fileVersion" >> $env:GITHUB_OUTPUT
          "runtime_identifier=$runtimeIdentifier" >> $env:GITHUB_OUTPUT
          "build_channel=$buildChannel" >> $env:GITHUB_OUTPUT

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore .\HardwareVision\HardwareVision.csproj `
            -r win-x64 `
            --artifacts-path "$env:RUNNER_TEMP\hardwarevision-package" 2>&1 |
            Tee-Object -FilePath "$env:RUNNER_TEMP\hardwarevision-package-logs\app-restore.log"

          dotnet restore .\HardwareVision.Tests\HardwareVision.Tests.csproj `
            --artifacts-path "$env:RUNNER_TEMP\hardwarevision-package" 2>&1 |
            Tee-Object -FilePath "$env:RUNNER_TEMP\hardwarevision-package-logs\restore.log"

      - name: Release build
        shell: pwsh
        run: |
          dotnet build .\HardwareVision\HardwareVision.csproj `
            -c Release --no-restore -m:1 -nodeReuse:false `
            -p:UseSharedCompilation=false `
            --artifacts-path "$env:RUNNER_TEMP\hardwarevision-package" 2>&1 |
            Tee-Object -FilePath "$env:RUNNER_TEMP\hardwarevision-package-logs\build.log"

      - name: Build custom test runner
        shell: pwsh
        run: |
          dotnet build .\HardwareVision.Tests\HardwareVision.Tests.csproj `
            -c Release --no-restore -m:1 -nodeReuse:false `
            -p:UseSharedCompilation=false `
            --artifacts-path "$env:RUNNER_TEMP\hardwarevision-package" 2>&1 |
            Tee-Object -FilePath "$env:RUNNER_TEMP\hardwarevision-package-logs\test-build.log"

      - name: Run custom console tests
        shell: pwsh
        run: |
          & "$env:RUNNER_TEMP\hardwarevision-package\bin\HardwareVision.Tests\release_win-x64\HardwareVision.Tests.exe" 2>&1 |
            Tee-Object -FilePath "$env:RUNNER_TEMP\hardwarevision-package-logs\tests.log"

      - name: Publish framework-dependent single-file executable
        shell: pwsh
        run: |
          $releaseDirectory = Join-Path $env:RUNNER_TEMP "hardwarevision-release"
          New-Item -ItemType Directory -Force -Path $releaseDirectory | Out-Null
          dotnet publish .\HardwareVision\HardwareVision.csproj `
            -c Release -r win-x64 --self-contained false --no-restore `
            -m:1 -nodeReuse:false `
            -p:PublishSingleFile=true -p:PublishTrimmed=false `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=None -p:DebugSymbols=false `
            -p:UseSharedCompilation=false `
            --artifacts-path "$env:RUNNER_TEMP\hardwarevision-package" `
            -o $releaseDirectory 2>&1 |
            Tee-Object -FilePath "$env:RUNNER_TEMP\hardwarevision-package-logs\publish.log"

      - name: Verify release executable
        shell: pwsh
        env:
          PRODUCT_VERSION: ${{ steps.metadata.outputs.product_version }}
          FILE_VERSION: ${{ steps.metadata.outputs.file_version }}
          RUNTIME_IDENTIFIER: ${{ steps.metadata.outputs.runtime_identifier }}
        run: |
          $releaseDirectory = Join-Path $env:RUNNER_TEMP "hardwarevision-release"
          $entries = @(Get-ChildItem $releaseDirectory -Force)
          if ($entries.Count -ne 1 -or $entries[0].PSIsContainer -or $entries[0].Name -cne "HardwareVision.exe") {
            throw "Release output must contain exactly one HardwareVision.exe."
          }
          $executable = $entries[0]
          if ($executable.Length -le 0) {
            throw "HardwareVision.exe is empty."
          }

          $version = $executable.VersionInfo
          if ($version.ProductName -cne "HardwareVision") {
            throw "ProductName mismatch: '$($version.ProductName)'."
          }
          if ($version.ProductVersion -cne $env:PRODUCT_VERSION) {
            throw "ProductVersion mismatch: '$($version.ProductVersion)', expected '$env:PRODUCT_VERSION'."
          }
          if ($version.FileVersion -cne $env:FILE_VERSION) {
            throw "FileVersion mismatch: '$($version.FileVersion)', expected '$env:FILE_VERSION'."
          }
          if ($env:RUNTIME_IDENTIFIER -cne "win-x64") {
            throw "RuntimeIdentifier mismatch: '$env:RUNTIME_IDENTIFIER'."
          }

          $stream = [IO.File]::OpenRead($executable.FullName)
          try {
            $reader = [IO.BinaryReader]::new($stream)
            $stream.Position = 0x3c
            $peOffset = $reader.ReadInt32()
            $stream.Position = $peOffset + 4
            $machine = $reader.ReadUInt16()
            if ($machine -ne 0x8664) {
              throw "HardwareVision.exe is not an x64 PE image; machine=0x$($machine.ToString('X4'))."
            }
          }
          finally {
            $stream.Dispose()
          }

          @(
            "ProductName=$($version.ProductName)"
            "ProductVersion=$($version.ProductVersion)"
            "FileVersion=$($version.FileVersion)"
            "RuntimeIdentifier=$env:RUNTIME_IDENTIFIER"
            "FrameworkDependent=true"
            "SelfContained=false"
            "PublishSingleFile=true"
            "PublishTrimmed=false"
            "FileName=$($executable.Name)"
            "FileSize=$($executable.Length)"
            "PEMachine=0x$($machine.ToString('X4'))"
          ) | Set-Content "$env:RUNNER_TEMP\hardwarevision-package-logs\release-validation.txt" -Encoding utf8

      - name: Sign or record unsigned status
        shell: pwsh
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $releaseDirectory = Join-Path $env:RUNNER_TEMP "hardwarevision-release"
          $executable = (Resolve-Path (Join-Path $releaseDirectory "HardwareVision.exe")).Path
          $statusPath = "$env:RUNNER_TEMP\hardwarevision-package-logs\signing-status.txt"
          $pfx = Join-Path $env:RUNNER_TEMP "hardwarevision-signing.pfx"
          try {
            $hasCertificate = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_BASE64) -and
              -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_PASSWORD)
            if ($hasCertificate) {
              [IO.File]::WriteAllBytes(
                $pfx,
                [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64)
              )
              $signTool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" `
                -Filter signtool.exe -Recurse |
                Sort-Object FullName -Descending |
                Select-Object -First 1
              if (-not $signTool) {
                throw "signtool.exe was not found on the runner."
              }
              & $signTool.FullName sign /fd SHA256 /f $pfx /p $env:WINDOWS_CERT_PASSWORD `
                /tr http://timestamp.digicert.com /td SHA256 $executable
              if ($LASTEXITCODE -ne 0) {
                throw "Authenticode signing failed."
              }
              & $signTool.FullName verify /pa /v $executable
              if ($LASTEXITCODE -ne 0) {
                throw "Authenticode verification failed."
              }
              "SIGNED: Authenticode signature and timestamp were verified by signtool." |
                Set-Content $statusPath -Encoding utf8
            }
            else {
              "UNSIGNED: Authenticode certificate or password was not configured for this workflow run." |
                Set-Content $statusPath -Encoding utf8
            }
          }
          finally {
            Remove-Item -LiteralPath $pfx -Force -ErrorAction SilentlyContinue
          }

          $entries = @(Get-ChildItem $releaseDirectory -Force)
          if ($entries.Count -ne 1 -or $entries[0].PSIsContainer -or $entries[0].Name -cne "HardwareVision.exe") {
            throw "Signing must not add release sidecar files."
          }

      - name: Generate internal build information
        shell: pwsh
        env:
          PRODUCT_VERSION: ${{ steps.metadata.outputs.product_version }}
          FILE_VERSION: ${{ steps.metadata.outputs.file_version }}
          BUILD_CHANNEL: ${{ steps.metadata.outputs.build_channel }}
        run: |
          @(
            "ProductVersion=$env:PRODUCT_VERSION"
            "FileVersion=$env:FILE_VERSION"
            "CommitSHA=$env:GITHUB_SHA"
            "RefName=$env:GITHUB_REF_NAME"
            "RefType=$env:GITHUB_REF_TYPE"
            "BuildChannel=$env:BUILD_CHANNEL"
            "UTCBuildTime=$([DateTime]::UtcNow.ToString('O'))"
            "SHA256=$((Get-FileHash (Join-Path $env:RUNNER_TEMP 'hardwarevision-release\HardwareVision.exe') -Algorithm SHA256).Hash.ToLowerInvariant())"
          ) | Set-Content "$env:RUNNER_TEMP\hardwarevision-package-logs\build-info.txt" -Encoding utf8
          dotnet list .\HardwareVision\HardwareVision.csproj package `
            --include-transitive --format json `
            > "$env:RUNNER_TEMP\hardwarevision-package-logs\dependency-inventory.json"

      - name: Verify repository remains clean
        shell: pwsh
        run: |
          git diff --check
          if ($LASTEXITCODE -ne 0) {
            throw "git diff --check reported whitespace errors."
          }
          $status = git status --porcelain
          $status | Set-Content "$env:RUNNER_TEMP\hardwarevision-package-logs\git-status.txt" -Encoding utf8
          if ($status) {
            throw "Package build modified the repository working tree."
          }

      - name: Attest release executable
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: ${{ runner.temp }}/hardwarevision-release/HardwareVision.exe

      - name: Upload release executable
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hardwarevision-release-executable
          path: ${{ runner.temp }}/hardwarevision-release/HardwareVision.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload package logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hardwarevision-package-logs
          path: ${{ runner.temp }}/hardwarevision-package-logs
          if-no-files-found: warn
          retention-days: 14
